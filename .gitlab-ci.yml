stages:
  - publish

publish:library:
  stage: publish
  image: $OUTLOUD_DOCKER_URL/node:latest
  resource_group: library
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*$/
    - if: $CI_PIPELINE_SOURCE == "web" && $PIPELINE == "publish"
  script:
    - pnpm install --loglevel error --prefer-offline
    - pnpm run build

    - |
      # Publish to npm registry
      pnpm config set "//registry.npmjs.org/:_authToken=${NPM_TOKEN}"
      pnpm publish --no-git-checks --access public

    - |
      # Publish to Gitlab registry
      pnpm config set "@outloud:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"
      pnpm config set "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}"
      pnpm publish --no-git-checks
